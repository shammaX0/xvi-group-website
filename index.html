          <style>
          /* ============ RESET & TOKENS ============ */
          *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
          :root{
            --bg:#060616;
              --bg-2:#0b0a24;
                --panel:#0f0f2e;
                  --light:#f5f4ff;
                    --light-2:#ecebff;
                      --violet:#7c3aed;
                        --violet-2:#a855f7;
                          --indigo:#4f46e5;
                            --blue:#2563eb;
                              --cyan:#22d3ee;
                                --ink:#0a0a1f;
                                  --muted:#a9a7c8;
                                    --muted-d:#5b5980;
                                      --glow:0 0 40px rgba(124,58,237,.55);
                                        --grad:linear-gradient(120deg,#4f46e5 0%,#7c3aed 45%,#2563eb 100%);
                                          --grad-2:linear-gradient(120deg,#a855f7,#22d3ee);
                                            --radius:22px;
                                              --ease:cubic-bezier(.22,1,.36,1);
                                                --maxw:1240px;
                                                }
                                                html{scroll-behavior:smooth}
                                                body{
                                                  font-family:'IBM Plex Sans Arabic','Tajawal',sans-serif;
                                                    background:var(--bg);color:var(--light);
                                                      overflow-x:hidden;line-height:1.75;font-size:16px;
                                                        -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
                                                        }
                                                        body[data-lang="en"]{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;direction:ltr}
                                                        ::selection{background:var(--violet);color:#fff}
                                                        a{color:inherit;text-decoration:none}
                                                        img{max-width:100%}
                                                        h1,h2,h3{line-height:1.18;font-weight:800}
                                                        body[data-lang="ar"] h1,body[data-lang="ar"] h2,body[data-lang="ar"] h3{font-family:'Tajawal',sans-serif;font-weight:800;line-height:1.4}
                                                        body[data-lang="ar"]{line-height:1.9;letter-spacing:0}
                                                        body[data-lang="en"] h1,body[data-lang="en"] h2,body[data-lang="en"] h3{font-family:'Poppins',sans-serif}

                                                        /* ============ SCROLLBAR ============ */
                                                        ::-webkit-scrollbar{width:10px}
                                                        ::-webkit-scrollbar-track{background:#0a0a1f}
                                                        ::-webkit-scrollbar-thumb{background:linear-gradient(#7c3aed,#2563eb);border-radius:10px}

                                                        /* ============ LANG (text swapped via JS) ============ */

                                                        /* ============ PRELOADER ============ */
                                                        #loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:grid;place-items:center;transition:opacity .7s var(--ease),visibility .7s}
                                                        #loader.done{opacity:0;visibility:hidden}
                                                        .loader-mark{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(3rem,9vw,6rem);letter-spacing:.15em;
                                                          background:var(--grad-2);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative}
                                                          .loader-bar{width:180px;height:3px;background:#211f45;border-radius:3px;margin:22px auto 0;overflow:hidden}
                                                          .loader-bar span{display:block;height:100%;width:0;background:var(--grad);border-radius:3px;animation:load 1.4s var(--ease) forwards}
                                                          @keyframes load{to{width:100%}}

                                                          /* ============ CUSTOM CURSOR ============ */
                                                          .cursor-dot,.cursor-ring{position:fixed;top:0;left:0;border-radius:50%;pointer-events:none;z-index:9000;mix-blend-mode:screen;transform:translate(-50%,-50%)}
                                                          .cursor-dot{width:7px;height:7px;background:var(--cyan)}
                                                          .cursor-ring{width:38px;height:38px;border:1.5px solid rgba(168,85,247,.7);transition:width .25s,height .25s,background .25s,border-color .25s}
                                                          .cursor-ring.hover{width:64px;height:64px;background:rgba(124,58,237,.18);border-color:var(--cyan)}
                                                          @media(hover:none){.cursor-dot,.cursor-ring{display:none}}

                                                          /* ============ SCROLL PROGRESS ============ */
                                                          #progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--grad-2);z-index:8000;box-shadow:0 0 12px var(--violet)}

                                                          /* ============ NAV ============ */
                                                          nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 0;transition:.4s var(--ease)}
                                                          nav.scrolled{padding:12px 0;background:rgba(6,6,22,.72);backdrop-filter:blur(18px);border-bottom:1px solid rgba(124,58,237,.18)}
                                                          .nav-inner{max-width:var(--maxw);margin:0 auto;padding:0 26px;display:flex;align-items:center;justify-content:space-between;gap:20px}
                                                          .brand{display:flex;align-items:center;gap:12px;font-family:'Poppins',sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:.12em;white-space:nowrap}
                                                          .brand .logo{width:48px;height:44px;display:grid;place-items:center;position:relative;overflow:visible;filter:drop-shadow(0 8px 20px rgba(124,58,237,.5))}
                                                          .brand .logo svg{width:100%;height:100%;display:block}
                                                          .brand .logo .shine{animation:shine 3.6s infinite}
                                                          @keyframes shine{0%,58%{transform:translateX(-140%)}100%{transform:translateX(240%)}}
                                                          .brand b{background:var(--grad-2);-webkit-background-clip:text;background-clip:text;color:transparent}
                                                          .nav-links{display:flex;align-items:center;gap:30px;font-size:.98rem;font-weight:500}
                                                          .nav-links a{position:relative;color:var(--muted);transition:.3s;padding:4px 0}
                                                          .nav-links a::after{content:"";position:absolute;bottom:-4px;right:0;height:2px;width:0;background:var(--grad-2);transition:.35s var(--ease)}
                                                          body[data-lang="en"] .nav-links a::after{right:auto;left:0}
                                                          .nav-links a:hover{color:#fff}
                                                          .nav-links a:hover::after{width:100%}
                                                          .nav-actions{display:flex;align-items:center;gap:14px}
                                                          .lang-btn{border:1px solid rgba(168,85,247,.4);background:rgba(124,58,237,.1);color:#fff;padding:8px 16px;border-radius:30px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.3s;font-family:inherit}
                                                          .lang-btn:hover{background:var(--violet);box-shadow:var(--glow)}
                                                          .btn-cta{background:var(--grad);color:#fff;padding:11px 24px;border-radius:30px;font-weight:600;font-size:.9rem;border:none;cursor:pointer;position:relative;overflow:hidden;transition:.35s;font-family:inherit}
                                                          .btn-cta::before{content:"";position:absolute;inset:0;background:var(--grad-2);opacity:0;transition:.35s}
                                                          .btn-cta span{position:relative;z-index:2}
                                                          .btn-cta:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(124,58,237,.5)}
                                                          .btn-cta:hover::before{opacity:1}
                                                          .burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px}
                                                          .burger span{width:26px;height:2px;background:#fff;transition:.3s}
                                                          .burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
                                                          .burger.open span:nth-child(2){opacity:0}
                                                          .burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

                                                          /* ============ LAYOUT ============ */
                                                          section{position:relative}
                                                          .wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
                                                          .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:.78rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--violet-2);margin-bottom:18px}
                                                          .eyebrow::before{content:"";width:26px;height:2px;background:var(--grad-2)}
                                                          .sec-title{font-size:clamp(1.7rem,3.4vw,2.7rem);margin-bottom:18px;letter-spacing:-.005em}
                                                          body[data-lang="ar"] .sec-title{line-height:1.4}
                                                          .grad-text{background:var(--grad-2);-webkit-background-clip:text;background-clip:text;color:transparent}
                                                          .sec-sub{color:var(--muted);font-size:1.02rem;max-width:600px;margin-bottom:10px}
                                                          .pad{padding:104px 0}

                                                          /* ============ HERO ============ */
                                                          #hero{min-height:100vh;display:flex;align-items:center;overflow:hidden;padding-top:90px}
                                                          #particles{position:absolute;inset:0;z-index:0}
                                                          .hero-orbs{position:absolute;inset:0;z-index:1;pointer-events:none}
                                                          .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;animation:float 14s ease-in-out infinite}
                                                          .orb.a{width:460px;height:460px;background:radial-gradient(circle,#7c3aed,transparent 70%);top:-120px;right:-80px}
                                                          .orb.b{width:520px;height:520px;background:radial-gradient(circle,#2563eb,transparent 70%);bottom:-160px;left:-120px;animation-delay:-5s}
                                                          .orb.c{width:300px;height:300px;background:radial-gradient(circle,#22d3ee,transparent 70%);top:40%;left:45%;animation-delay:-9s;opacity:.35}
                                                          @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-40px) scale(1.08)}66%{transform:translate(-30px,30px) scale(.95)}}
                                                          .hero-grid{position:absolute;inset:0;z-index:0;opacity:.35;
                                                            background-image:linear-gradient(rgba(124,58,237,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.09) 1px,transparent 1px);
                                                              background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 30%,transparent 75%)}
                                                              .hero-inner{position:relative;z-index:3;max-width:var(--maxw);margin:0 auto;padding:0 26px;width:100%}
                                                              .hero-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(124,58,237,.12);border:1px solid rgba(168,85,247,.3);padding:8px 18px;border-radius:30px;font-size:.86rem;color:var(--light-2);margin-bottom:28px;backdrop-filter:blur(8px)}
                                                              .hero-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 1.8s infinite}
                                                              @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
                                                              .hero-inner h1{font-size:clamp(2.1rem,5vw,4.3rem);letter-spacing:-.01em;margin-bottom:24px;line-height:1.28}
                                                              body[data-lang="en"] .hero-inner h1{line-height:1.08;letter-spacing:-.02em}
                                                              .hero-inner h1 .line{display:block;overflow:hidden;padding:.06em 0}
                                                              .hero-inner h1 .line > span{display:inline-block;transform:translateY(110%);opacity:0;animation:rise .9s var(--ease) forwards}
                                                              .hero-inner h1 .line:nth-child(2) > span{animation-delay:.12s}
                                                              .hero-inner h1 .line:nth-child(3) > span{animation-delay:.24s}
                                                              @keyframes rise{to{transform:translateY(0);opacity:1}}
                                                              .hero-lead{font-size:clamp(1rem,1.5vw,1.16rem);color:var(--muted);max-width:560px;margin-bottom:36px;opacity:0;animation:fadeUp 1s var(--ease) .5s forwards}
                                                              @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
                                                              .hero-btns{display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:fadeUp 1s var(--ease) .68s forwards}
                                                              .btn-ghost{border:1px solid rgba(168,85,247,.45);color:#fff;padding:14px 30px;border-radius:30px;font-weight:600;transition:.35s;display:inline-flex;align-items:center;gap:10px;cursor:pointer;background:transparent;font-family:inherit;font-size:1rem}
                                                              .btn-ghost:hover{background:rgba(124,58,237,.15);border-color:var(--cyan);transform:translateY(-2px)}
                                                              .btn-primary{background:var(--grad);color:#fff;padding:14px 32px;border-radius:30px;font-weight:700;display:inline-flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:.35s;cursor:pointer;border:none;font-family:inherit;font-size:1rem}
                                                              .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(124,58,237,.55)}
                                                              .hero-scroll{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted-d);font-size:.75rem;letter-spacing:.2em}
                                                              .hero-scroll .mouse{width:24px;height:38px;border:2px solid var(--muted-d);border-radius:14px;position:relative}
                                                              .hero-scroll .mouse::after{content:"";position:absolute;top:7px;left:50%;transform:translateX(-50%);width:4px;height:7px;background:var(--cyan);border-radius:3px;animation:scrolly 1.6s infinite}
                                                              @keyframes scrolly{0%{opacity:0;top:7px}50%{opacity:1}100%{opacity:0;top:18px}}

                                                              /* marquee */
                                                              .marquee{margin-top:70px;border-top:1px solid rgba(124,58,237,.16);border-bottom:1px solid rgba(124,58,237,.16);padding:22px 0;overflow:hidden;white-space:nowrap;background:rgba(11,10,36,.5)}
                                                              .marquee-track{display:inline-flex;gap:60px;animation:scroll-x 26s linear infinite;font-family:'Poppins',sans-serif;font-weight:600;font-size:1.25rem;color:#d9ccff;-webkit-text-stroke:0;letter-spacing:.01em;text-shadow:0 0 22px rgba(124,58,237,.35)}
                                                              body[data-lang="ar"] .marquee-track{font-family:'Tajawal',sans-serif;font-weight:700}
                                                              .marquee-track span{display:inline-flex;align-items:center;gap:60px}
                                                              .marquee-track span::after{content:"‚ú¶";color:var(--cyan);text-shadow:0 0 14px rgba(34,211,238,.6)}
                                                              @keyframes scroll-x{to{transform:translateX(-50%)}}
                                                              body[data-lang="ar"] .marquee-track{animation-direction:reverse}

                                                              /* ============ STATS ============ */
                                                              .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:-10px}
                                                              .stat{padding:34px 26px;border-radius:var(--radius);background:linear-gradient(160deg,rgba(124,58,237,.1),rgba(124,58,237,.05));border:1px solid rgba(124,58,237,.2);text-align:center;position:relative;overflow:hidden}
                                                              .stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad-2);transform:scaleX(0);transition:.5s var(--ease)}
                                                              .stat.in::before{transform:scaleX(1)}
                                                              .stat .num{font-family:'Poppins',sans-serif;font-size:clamp(2.2rem,4vw,3.2rem);font-weight:800;background:var(--grad-2);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
                                                              .stat .lbl{color:var(--muted);font-size:.92rem;margin-top:10px}
                                                              .stat .vic{width:56px;height:56px;border-radius:15px;background:var(--grad);display:grid;place-items:center;margin:0 auto 18px;box-shadow:0 10px 26px rgba(124,58,237,.35)}
                                                              .stat .vic svg{width:27px;height:27px;stroke:#fff}
                                                              .stat .vt{font-family:'Tajawal',sans-serif;font-weight:800;font-size:1.2rem;color:#fff;line-height:1.4}
                                                              body[data-lang="en"] .stat .vt{font-family:'Poppins',sans-serif;font-size:1.12rem}

                                                              /* ============ SERVICES ============ */
                                                              .services-head{display:flex;justify-content:space-between;align-items:flex-end;gap:30px;flex-wrap:wrap;margin-bottom:56px}
                                                              .svc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
                                                              .svc-card{position:relative;padding:44px 38px;border-radius:var(--radius);background:linear-gradient(165deg,rgba(20,18,52,.9),rgba(11,10,36,.7));border:1px solid rgba(124,58,237,.18);overflow:hidden;transition:transform .4s var(--ease),border-color .4s;transform-style:preserve-3d;cursor:pointer}
                                                              .svc-card::before{content:"";position:absolute;inset:0;background:radial-gradient(500px circle at var(--mx,50%) var(--my,50%),rgba(124,58,237,.22),transparent 45%);opacity:0;transition:opacity .4s}
                                                              .svc-card:hover::before{opacity:1}
                                                              .svc-card:hover{border-color:rgba(168,85,247,.55)}
                                                              .svc-num{position:absolute;top:32px;left:38px;font-family:'Poppins',sans-serif;font-size:2.6rem;font-weight:800;background:var(--grad-2);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;z-index:3;opacity:.95}
                                                              body[data-lang="en"] .svc-num{left:auto;right:38px}
                                                              .svc-ic{width:64px;height:64px;border-radius:16px;background:var(--grad);display:grid;place-items:center;margin-bottom:26px;box-shadow:0 10px 30px rgba(124,58,237,.35);position:relative;z-index:2}
                                                              .svc-ic svg{width:32px;height:32px;stroke:#fff}
                                                              .svc-card h3{font-size:1.32rem;margin-bottom:13px;position:relative;z-index:2}
                                                              .svc-card p{color:var(--muted);font-size:1rem;position:relative;z-index:2;margin-bottom:22px}
                                                              .svc-tags{display:flex;flex-wrap:wrap;gap:8px;position:relative;z-index:2}
                                                              .svc-tags span{font-size:.78rem;padding:6px 13px;border-radius:20px;background:rgba(124,58,237,.14);border:1px solid rgba(168,85,247,.25);color:var(--light-2)}
                                                              .svc-arrow{position:absolute;bottom:38px;left:38px;width:44px;height:44px;border-radius:50%;border:1px solid rgba(168,85,247,.4);display:grid;place-items:center;transition:.35s;z-index:2}
                                                              body[data-lang="ar"] .svc-arrow{left:auto;right:38px}
                                                              .svc-card:hover .svc-arrow{background:var(--grad);border-color:transparent;transform:rotate(0)}
                                                              body[data-lang="ar"] .svc-card .svc-arrow svg{transform:scaleX(-1)}
                                                              .svc-card:has(.svc-arrow){padding-bottom:100px}

                                                              /* ============ ABOUT (LIGHT) ============ */
                                                              .light-sec{background:linear-gradient(180deg,#f5f4ff,#ecebff);color:var(--ink);position:relative;overflow:hidden}
                                                              .light-sec .eyebrow{color:var(--violet)}
                                                              .light-sec .sec-sub{color:#4a4870}
                                                              .about-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:70px;align-items:center}
                                                              .about-copy h2{color:var(--ink)}
                                                              .about-copy p{color:#403e63;font-size:1.08rem;margin-bottom:22px}
                                                              .about-list{display:flex;flex-direction:column;gap:18px;margin-top:30px}
                                                              .about-item{display:flex;gap:16px;align-items:flex-start}
                                                              .about-item .tick{flex-shrink:0;width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center}
                                                              .about-item .tick svg{width:16px;height:16px;stroke:#fff}
                                                              .about-item b{display:block;color:var(--ink);font-size:1.05rem}
                                                              .about-item span{color:#4a4870;font-size:.95rem}
                                                              .about-visual{position:relative;aspect-ratio:1;border-radius:28px;background:var(--grad);overflow:hidden;box-shadow:0 30px 70px rgba(124,58,237,.35);display:grid;place-items:center}
                                                              .about-visual .ring{position:absolute;border:1.5px solid rgba(255,255,255,.3);border-radius:50%}
                                                              .about-visual .ring:nth-child(1){width:75%;height:75%;animation:spin 18s linear infinite}
                                                              .about-visual .ring:nth-child(2){width:52%;height:52%;animation:spin 12s linear infinite reverse}
                                                              .about-visual .ring:nth-child(3){width:30%;height:30%;animation:spin 8s linear infinite}
                                                              .about-visual .ring::before{content:"";position:absolute;top:-5px;left:50%;width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 0 16px #fff}
                                                              @keyframes spin{to{transform:rotate(360deg)}}

<!-- ===== PRO ANIMATION LAYER (added) ===== -->
<style id="pro-anim">
:root{
  --ease-pro:cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.4,.5,1);
}
/* smoother, choreographed scroll reveals (opacity+transform only ‚Äî blur transitions stall in Chrome) */
.reveal{transform:translateY(42px) scale(.99);
  transition:opacity .9s var(--ease-pro),transform .9s var(--ease-pro)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}
.reveal.d3{transition-delay:.24s}.reveal.d4{transition-delay:.32s}
/* directional reveals (set via JS on about section) */
.reveal-l{transform:translateX(-52px) scale(.99)}
.reveal-r{transform:translateX(52px) scale(.99)}
.reveal-l.in,.reveal-r.in{transform:none}

/* nav drop-in + badge entrance */
nav{animation:navDrop .85s var(--ease-pro) both}
@keyframes navDrop{from{transform:translateY(-110%);opacity:0}to{transform:translateY(0);opacity:1}}
.hero-badge{animation:fadeUp .9s var(--ease-pro) .2s both}

/* premium hero headline: blur-in rise (overrides earlier keyframes) */
@keyframes rise{from{transform:translateY(115%) scale(.97);filter:blur(9px);opacity:0}
  to{transform:translateY(0) scale(1);filter:blur(0);opacity:1}}

/* flowing gradient on highlighted text */
.grad-text{background:linear-gradient(110deg,#a855f7,#22d3ee,#a855f7)!important;
  background-size:220% auto!important;-webkit-background-clip:text!important;background-clip:text!important;
  animation:gradFlow 7s linear infinite}
.brand b{background:linear-gradient(110deg,#a855f7,#22d3ee,#a855f7);background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:gradFlow 7s linear infinite}
@keyframes gradFlow{to{background-position:220% center}}

/* marquee edge fade */
.marquee{-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent)}

/* shine sweep on primary buttons */
.btn-primary,.btn-cta{position:relative;overflow:hidden}
.btn-primary::after,.btn-cta::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.28),transparent);transform:skewX(-18deg);
  transition:left .7s var(--ease-pro);pointer-events:none;z-index:1}
.btn-primary:hover::after,.btn-cta:hover::after{left:150%}

/* icon micro-interactions */
.svc-ic,.why-card .ic,.stat .vic,.contact-line .ic{
  transition:transform .5s var(--ease-spring),box-shadow .5s var(--ease-pro)}
.svc-card:hover .svc-ic{transform:translateY(-5px) rotate(-4deg) scale(1.07)}
.why-card:hover .ic{transform:translateY(-5px) scale(1.09)}
.contact-line:hover .ic{transform:scale(1.08)}

/* CTA banner breathing glow */
.cta-banner::before{animation:breathe 9s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.72}}

/* active nav (scroll-spy) + keyboard focus */
.nav-links a.active{color:#fff}
.nav-links a.active::after{width:100%}
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{
  outline:2px solid var(--cyan);outline-offset:3px;border-radius:8px}

/* honor reduced motion for the new layer too */
@media(prefers-reduced-motion:reduce){
  nav,.hero-badge,.grad-text,.brand b,.cta-banner::before{animation:none!important}
  .reveal,.reveal-l,.reveal-r{filter:none!important;transform:none!important}
}
</style>

</head>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* ===== NAV SCROLL ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const nav=document.getElementById('nav');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          addEventListener('scroll',()=>{nav.classList.toggle('scrolled',scrollY>40)});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* ===== BURGER ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const burger=document.getElementById('burger'),navLinks=document.getElementById('navLinks');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          burger.addEventListener('click',()=>{burger.classList.toggle('open');navLinks.classList.toggle('open')});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          navLinks.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{burger.classList.remove('open');navLinks.classList.remove('open')}));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* ===== SCROLL PROGRESS ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const prog=document.getElementById('progress');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          addEventListener('scroll',()=>{const h=document.documentElement;prog.style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight)*100)+'%'});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* ===== REVEAL + STATS + STAT BAR ===== */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const io=new IntersectionObserver((es)=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            es.forEach(e=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(e.isIntersecting){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      e.target.classList.add('in');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(e.target.classList.contains('stat'))e.target.classList.add('in');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const nums=e.target.querySelectorAll('[data-count]');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        nums.forEach(n=>countUp(n));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              io.unobserve(e.target);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    },{threshold:.18});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function countUp(el){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const target=+el.dataset.count,suffix=el.dataset.suffix||'',dur=1600,start=performance.now();
