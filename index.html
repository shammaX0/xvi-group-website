                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              p.x+=p.vx;p.y+=p.vy;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if(p.x<0||p.x>W)p.vx*=-1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(p.y<0||p.y>H)p.vy*=-1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle='rgba(168,85,247,.8)';ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              for(let j=i+1;j<parts.length;j++){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const q=parts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if(d<130){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(99,102,241,'+(1-d/130)*.35+')';ctx.lineWidth=.6;ctx.stroke();}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const mdx=p.x-pmx,mdy=p.y-pmy,md=Math.hypot(mdx,mdy);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(md<160){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(pmx,pmy);ctx.strokeStyle='rgba(34,211,238,'+(1-md/160)*.5+')';ctx.lineWidth=.8;ctx.stroke();}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          requestAnimationFrame(draw);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          addEventListener('resize',resize);resize();draw();

<!-- ===== PRO ANIMATION LAYER (added) ===== -->
<script>
(function(){
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var fine=matchMedia('(hover:hover) and (pointer:fine)').matches;

  /* directional reveal on About */
  var ac=document.querySelector('.about-copy'); if(ac)ac.classList.add('reveal-l');
  var av=document.querySelector('.about-visual'); if(av)av.classList.add('reveal-r');

  if(!reduce && fine){
    /* magnetic buttons */
    document.querySelectorAll('.btn-primary,.btn-ghost,.btn-cta').forEach(function(btn){
      btn.addEventListener('mousemove',function(e){
        var r=btn.getBoundingClientRect();
        var x=e.clientX-r.left-r.width/2, y=e.clientY-r.top-r.height/2;
        btn.style.transform='translate('+(x*.22)+'px,'+(y*.32)+'px)';
      });
      btn.addEventListener('mouseleave',function(){btn.style.transform='';});
    });
    /* hero content parallax with cursor */
    var hero=document.getElementById('hero'), hi=document.querySelector('.hero-inner');
    if(hero&&hi){
      hero.addEventListener('mousemove',function(e){
        var r=hero.getBoundingClientRect();
        var dx=(e.clientX-r.left)/r.width-.5, dy=(e.clientY-r.top)/r.height-.5;
        hi.style.transform='translate('+(dx*-16)+'px,'+(dy*-11)+'px)';
      });
      hero.addEventListener('mouseleave',function(){hi.style.transform='';});
    }
  }

  /* scroll-spy: highlight active nav link */
  var navLinks=document.getElementById('navLinks');
  if(navLinks){
    var links=[].slice.call(navLinks.querySelectorAll('a[href^="#"]'));
    var map={}; links.forEach(function(a){map[a.getAttribute('href').slice(1)]=a;});
    var spy=new IntersectionObserver(function(es){
      es.forEach(function(e){
        if(e.isIntersecting){
          var link=map[e.target.id]; if(!link)return;
          links.forEach(function(a){a.classList.remove('active');a.removeAttribute('aria-current');});
          link.classList.add('active'); link.setAttribute('aria-current','true');
        }
      });
    },{rootMargin:'-45% 0px -50% 0px'});
    Object.keys(map).forEach(function(id){var s=document.getElementById(id); if(s)spy.observe(s);});
  }
})();
</script>
